# ============================================================
# 再塑通 RePlasMatch — Nginx 生产配置
# 适用：Ubuntu 22.04 / CentOS 7
# 路径：/etc/nginx/sites-available/zaisutong
# ============================================================

# ---- 速率限制 --------------------------------------------------
# 每个 IP 每秒最多 30 个请求，突发 50
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---- HTTP → HTTPS 强制跳转 --------------------------------------
server {
    listen 80;
    server_name api.zaisutong.cn;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS -----------------------------------------------------
server {
    listen 443 ssl http2;
    server_name api.zaisutong.cn;

    # SSL 证书（Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/api.zaisutong.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zaisutong.cn/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- gzip --------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ---- 日志 --------------------------------------------------
    access_log /var/log/nginx/zaisutong-access.log;
    error_log  /var/log/nginx/zaisutong-error.log;

    # ---- 管理后台静态文件 ---------------------------------------
    location /admin {
        proxy_pass http://127.0.0.1:3456/admin;
    }

    location /static {
        alias /opt/zaisutong/backend/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---- WebSocket ---------------------------------------------
    location /ws {
        proxy_pass http://127.0.0.1:3456/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ---- API 反向代理 ------------------------------------------
    location /api {
        # 速率限制
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;

        # 透传客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲
        proxy_buffering off;
        proxy_request_buffering off;

        # 最大上传 5MB
        client_max_body_size 5m;
    }

    # ---- 健康检查 ----------------------------------------------
    location /api/health {
        proxy_pass http://127.0.0.1:3456/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
